---
name: SIMNOS Tests
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"
  pull_request: ~

env:
  IMAGE_NAME: "simnos"

jobs:
  lint:
    runs-on: "ubuntu-latest"
    env:
      INVOKE_LOCAL: "True"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v5"
      - name: "Install uv"
        uses: "astral-sh/setup-uv@v7"
        with:
          version: "0.9.8"
          activate-environment: true
          enable-cache: true
      - name: "Linting: ruff"
        run: "uv run invoke ruff"
      - name: "Security: bandit"
        run: "uv run invoke bandit"

  pytest:
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.13", "3.14"]
    runs-on: "ubuntu-latest"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v5"
      - name: "Install uv"
        uses: "astral-sh/setup-uv@v7"
        with:
          version: "0.9.8"
          activate-environment: true
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: "Run Tests"
        run: "uv run pytest -n auto"
    needs:
      - "lint"

  pytest-full-matrix:
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.13", "3.14"]
        os: ["macos-latest", "windows-latest"]
    runs-on: "${{ matrix.os }}"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v5"
      - name: "Install uv"
        uses: "astral-sh/setup-uv@v7"
        with:
          version: "0.9.8"
          activate-environment: true
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: "Run Tests"
        run: "uv run pytest -n auto"
    needs:
      - "lint"

  build:
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.13", "3.14"]
    runs-on: "ubuntu-latest"
    env:
      PYTHON_VER: ${{ matrix.python-version }}
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v5"
      - name: "Install uv"
        uses: "astral-sh/setup-uv@v7"
        with:
          version: "0.9.8"
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: "Get image version"
        run: "echo IMAGE_VER=$(python -c \"import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])\")-py${{ matrix.python-version }} >> $GITHUB_ENV"
      - name: "Setup Docker Buildx"
        id: "buildx"
        uses: "docker/setup-buildx-action@v3"
      - name: "Build"
        uses: "docker/build-push-action@v6"
        with:
          builder: "${{ steps.buildx.outputs.name }}"
          context: "."
          push: false
          tags: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_VER }}"
          file: "./docker/Dockerfile"
          cache-from: "type=gha,scope=${{ env.IMAGE_NAME }}-py${{ matrix.python-version }}"
          cache-to: "type=gha,scope=${{ env.IMAGE_NAME }}-py${{ matrix.python-version }}"
          build-args: |
            PYTHON_VER=${{ env.PYTHON_VER }}
    needs:
      - "pytest"

---
name: Docker Publish
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: "ubuntu-latest"
    env:
      INVOKE_LOCAL: "True"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v5"
      - name: "Install uv"
        uses: "astral-sh/setup-uv@v7"
        with:
          version: "0.9.8"
          activate-environment: true
          enable-cache: true
          python-version: "3.13"
      - name: "Linting: ruff"
        run: "uv run invoke ruff"
      - name: "Security: bandit"
        run: "uv run invoke bandit"
      - name: "Run Tests"
        run: "uv run pytest -n auto"

  scan:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v5"
      - name: "Lowercase image name"
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: "Setup Docker Buildx"
        uses: "docker/setup-buildx-action@v3"
      - name: "Build image for scanning"
        uses: "docker/build-push-action@v6"
        with:
          context: "."
          file: "./docker/Dockerfile"
          push: false
          load: true
          platforms: "linux/amd64"
          tags: "${{ env.IMAGE_NAME }}:scan"
          cache-from: "type=gha,scope=docker-scan"
          cache-to: "type=gha,mode=max,scope=docker-scan"
      - name: "Trivy vulnerability scan"
        uses: "aquasecurity/trivy-action@0.34.1"
        with:
          image-ref: "${{ env.IMAGE_NAME }}:scan"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

  publish:
    runs-on: "ubuntu-latest"
    needs:
      - "test"
      - "scan"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v5"
      - name: "Lowercase image name"
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: "Set up QEMU"
        uses: "docker/setup-qemu-action@v3"
      - name: "Setup Docker Buildx"
        uses: "docker/setup-buildx-action@v3"
      - name: "Login to GHCR"
        uses: "docker/login-action@v3"
        with:
          registry: "${{ env.REGISTRY }}"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"
      - name: "Extract metadata"
        id: "meta"
        uses: "docker/metadata-action@v5"
        with:
          images: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      - name: "Build and push"
        uses: "docker/build-push-action@v6"
        with:
          context: "."
          file: "./docker/Dockerfile"
          push: true
          platforms: "linux/amd64,linux/arm64"
          tags: "${{ steps.meta.outputs.tags }}"
          labels: "${{ steps.meta.outputs.labels }}"
          cache-from: |
            type=gha,scope=docker-scan
            type=gha,scope=docker-publish
          cache-to: "type=gha,mode=max,scope=docker-publish"

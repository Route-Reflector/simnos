<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <style>
      .bg { fill: #009485; stroke-width: 0; }
      .body-side { fill: #7cb342; }
      .body-top { fill: #9ccc65; }
      .arrow { fill: #fff; }
      .arrow-line { stroke: #fff; stroke-width: 2.5; stroke-linecap: round; fill: none; }
    </style>
  </defs>
  <!-- Rounded square background -->
  <rect class="bg" x="2" y="2" width="60" height="60" rx="12" ry="12"/>
  <!-- Router body (larger cylinder) -->
  <!-- Side face -->
  <path class="body-side" d="M 8,26 Q 8,34 32,38 Q 56,34 56,26 L 56,42 Q 56,50 32,54 Q 8,50 8,42 Z"/>
  <!-- Top ellipse -->
  <ellipse class="body-top" cx="32" cy="26" rx="24" ry="9"/>
  <!-- Vertical arrow (up-down connected) inside top ellipse -->
  <line class="arrow-line" x1="32" y1="20" x2="32" y2="32"/>
  <polygon class="arrow" points="32,19 35.5,23 28.5,23"/>
  <polygon class="arrow" points="32,33 28.5,29 35.5,29"/>
  <!-- Horizontal arrow (left-right connected) inside top ellipse -->
  <line class="arrow-line" x1="16" y1="26" x2="48" y2="26"/>
  <polygon class="arrow" points="15,26 19,22.5 19,29.5"/>
  <polygon class="arrow" points="49,26 45,22.5 45,29.5"/>
</svg>
